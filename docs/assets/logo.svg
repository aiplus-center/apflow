<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- apflow Cute Manta Ray Logo - Tech Blue Edition -->
  
  <defs>
    <!-- Tech Blue Gradient -->
    <linearGradient id="bodyBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/> <!-- Blue 400 -->
      <stop offset="100%" stop-color="#3B82F6"/> <!-- Blue 500 -->
    </linearGradient>
  </defs>

  <!-- Thick Outline -->
  <path d="M 256,80 
           C 160,80 80,140 40,240 
           Q 35,255 55,260 
           C 100,270 160,320 230,320 
           L 235,340 
           C 220,350 220,375 240,375 
           L 250,375 
           C 250,450 260,480 280,470 
           C 270,475 265,450 265,375 
           L 275,375 
           C 295,375 295,350 280,340 
           L 285,320 
           C 355,320 415,270 460,260 
           Q 480,255 475,240 
           C 435,140 355,80 256,80 Z" 
        fill="none" stroke="#0F172A" stroke-width="12" stroke-linejoin="round"/>

  <!-- Main Body Fill -->
  <path d="M 256,80 
           C 160,80 80,140 40,240 
           Q 35,255 55,260 
           C 100,270 160,320 230,320 
           L 235,340 
           C 220,350 220,375 240,375 
           L 250,375 
           C 250,450 260,480 280,470 
           C 270,475 265,450 265,375 
           L 275,375 
           C 295,375 295,350 280,340 
           L 285,320 
           C 355,320 415,270 460,260 
           Q 480,255 475,240 
           C 435,140 355,80 256,80 Z" 
        fill="url(#bodyBlue)"/>

  <!-- Tech Dark Blue Spots (The "Task Nodes") -->
  <g fill="#1D4ED8" opacity="0.4">
    <ellipse cx="120" cy="235" rx="18" ry="12" transform="rotate(-20, 120, 235)"/>
    <ellipse cx="165" cy="275" rx="15" ry="10" transform="rotate(-10, 165, 275)"/>
    <ellipse cx="215" cy="295" rx="12" ry="8"/>
    
    <ellipse cx="392" cy="235" rx="18" ry="12" transform="rotate(20, 392, 235)"/>
    <ellipse cx="347" cy="275" rx="15" ry="10" transform="rotate(10, 347, 275)"/>
    <ellipse cx="297" cy="295" rx="12" ry="8"/>

    <circle cx="256" cy="275" r="5"/>
    <circle cx="225" cy="255" r="4"/>
    <circle cx="287" cy="255" r="4"/>
  </g>

  <!-- Cute Face -->
  <!-- Eyes -->
  <ellipse cx="215" cy="185" rx="10" ry="14" fill="#0F172A"/>
  <ellipse cx="297" cy="185" rx="10" ry="14" fill="#0F172A"/>
  
  <!-- Mouth (W-shape) -->
  <path d="M 235,195 Q 245,210 256,200 Q 267,210 277,195" 
        fill="none" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Pink Cheeks -->
  <ellipse cx="180" cy="215" rx="22" ry="14" fill="#F472B6" opacity="0.6"/>
  <ellipse cx="332" cy="215" rx="22" ry="14" fill="#F472B6" opacity="0.6"/>

  <!-- Gills (Action flow indicators) -->
  <g stroke="#0F172A" stroke-width="4" stroke-linecap="round" opacity="0.2">
    <line x1="230" y1="230" x2="245" y2="230"/>
    <line x1="230" y1="245" x2="245" y2="245"/>
    <line x1="230" y1="260" x2="245" y2="260"/>
    
    <line x1="267" y1="230" x2="282" y2="230"/>
    <line x1="267" y1="245" x2="282" y2="245"/>
    <line x1="267" y1="260" x2="282" y2="260"/>
  </g>
</svg>
