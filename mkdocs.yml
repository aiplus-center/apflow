site_name: apflow Documentation
site_description: AI Agent Production Middleware
site_url: https://apflow.aiperceivable.com
repo_url: https://github.com/aiperceivable/apflow
repo_name: aiperceivable/apflow
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 aiperceivable

# Theme
theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.code.select
  icon:
    repo: fontawesome/brands/github

# Navigation
nav:
  - Home: prd.md
  - Design:
    - PRD: prd.md
    - Tech Design: tech-design.md
  - Features:
    - Overview: features/overview.md
    - Storage Migration: features/storage-migration.md
    - Project Slimming: features/project-slimming.md
    - apcore Bridge: features/apcore-bridge.md
    - Durable Execution: features/durable-execution.md
    - Cost Governance: features/cost-governance.md
    - TaskCreator Relaxation: features/task-creator-relaxation.md
  - Architecture:
    - Task Orchestration: architecture/task-orchestration.md
    - Extension Registry: architecture/extension-registry-design.md
    - Exception Handling: architecture/exception-handling.md
    - Configuration: architecture/configuration.md

# Plugins
plugins:
  - search
  - mermaid2:
      arguments:
        theme: base
        themeVariables:
          primaryColor: '#6366f1'
          primaryTextColor: '#fff'
          primaryBorderColor: '#6366f1'
          lineColor: '#F8B229'
          secondaryColor: '#006100'
          tertiaryColor: '#fff'
  - minify:
      minify_html: true

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aiperceivable/apflow
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/apflow/
